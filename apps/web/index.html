<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D AI Companion</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <canvas id="stage" aria-label="Nhân vật AI 3D"></canvas>

    <div class="toast-region" id="toast-region" aria-live="polite"></div>

    <aside class="control-panel" id="controls" aria-label="Tùy chỉnh nhân vật">
      <div class="panel-header">
        <div>
          <p class="panel-title">3D AI Companion</p>
          <p class="panel-subtitle" id="character-status">Đang khởi động...</p>
        </div>
        <span class="state-pill" id="state-pill">BOOTING</span>
      </div>

      <div class="control-tabs" role="tablist" aria-label="Nhóm tùy chỉnh">
        <button class="control-tab is-active" id="control-tab-models" type="button" role="tab" aria-selected="true" aria-controls="control-models">Nhân vật</button>
        <button class="control-tab" id="control-tab-animations" type="button" role="tab" aria-selected="false" aria-controls="control-animations">Động tác</button>
        <button class="control-tab" id="control-tab-backgrounds" type="button" role="tab" aria-selected="false" aria-controls="control-backgrounds">Bối cảnh</button>
      </div>

      <section class="control-section is-active" id="control-models" role="tabpanel" aria-labelledby="control-tab-models">
        <p class="control-title" id="model-title">Nhân vật</p>
        <div class="button-grid" id="model-buttons"></div>
      </section>

      <section class="control-section" id="control-animations" role="tabpanel" aria-labelledby="control-tab-animations" hidden>
        <p class="control-title" id="animation-title">Động tác</p>
        <div class="button-grid" id="animation-buttons"></div>
      </section>

      <section class="control-section" id="control-backgrounds" role="tabpanel" aria-labelledby="control-tab-backgrounds" hidden>
        <p class="control-title" id="background-title">Bối cảnh</p>
        <div class="button-grid" id="background-buttons"></div>
      </section>
    </aside>

    <aside class="chat-panel" id="chat-panel" aria-label="AI companion chat">
      <div class="chat-header">
        <div>
          <p class="chat-title" id="chat-character-name">Mika</p>
          <p class="chat-status" id="chat-status">Sẵn sàng</p>
        </div>
        <div class="chat-actions">
          <button class="icon-button" id="voice-toggle" type="button" title="Bật hoặc tắt giọng nói" aria-label="Bật hoặc tắt giọng nói" aria-pressed="true">On</button>
          <button class="icon-button" id="toggle-menu" type="button" title="Cài đặt và trí nhớ" aria-label="Cài đặt và trí nhớ" aria-expanded="false" aria-controls="chat-menu">Menu</button>
          <button class="icon-button" id="collapse-chat" type="button" title="Thu gọn trò chuyện" aria-label="Thu gọn trò chuyện" aria-expanded="true">Min</button>
        </div>
      </div>

      <div class="voice-toolbar" id="voice-toolbar">
        <button class="tool-button" id="stop-speaking" type="button" disabled>Dừng nói</button>
        <button class="tool-button" id="replay-reply" type="button" disabled>Phát lại</button>
        <button class="tool-button" id="clear-chat" type="button">Xóa hội thoại</button>
      </div>

      <div class="chat-menu" id="chat-menu" style="display: none;">
        <div class="menu-tabs" role="tablist" aria-label="Dữ liệu trò chuyện">
          <button class="menu-tab-btn is-active" id="tab-sessions-btn" type="button" role="tab" aria-selected="true" aria-controls="pane-sessions">Hội thoại</button>
          <button class="menu-tab-btn" id="tab-memory-btn" type="button" role="tab" aria-selected="false" aria-controls="pane-memory">Trí nhớ</button>
        </div>

        <div class="menu-pane" id="pane-sessions" role="tabpanel" aria-labelledby="tab-sessions-btn">
          <div class="menu-actions-row">
            <button class="tool-button" id="new-session-btn" type="button">Hội thoại mới</button>
            <button class="tool-button" id="export-btn" type="button">Xuất dữ liệu</button>
          </div>
          <div class="search-box">
            <input class="search-input" id="session-search" type="search" placeholder="Tìm hội thoại…" aria-label="Tìm hội thoại" />
          </div>
          <div class="scroll-list" id="sessions-list"></div>
        </div>

        <div class="menu-pane" id="pane-memory" role="tabpanel" aria-labelledby="tab-memory-btn" style="display: none;">
          <div class="memory-settings-row">
            <label class="toggle-container">
              <input id="toggle-memory-checkbox" type="checkbox" checked />
              <span class="toggle-label">Ghi nhớ dài hạn</span>
            </label>
            <button class="tool-button is-danger" id="clear-memories-btn" type="button">Xóa tất cả</button>
          </div>
          <div class="scroll-list" id="memories-list"></div>
        </div>
      </div>

      <div class="chat-log" id="chat-log" aria-live="polite"></div>

      <form class="chat-form" id="chat-form">
        <textarea
          class="chat-input"
          id="chat-input"
          name="message"
          maxlength="600"
          rows="2"
          placeholder="Nói gì đó với mình…"
          aria-label="Tin nhắn"
        ></textarea>
        <button class="chat-send" id="chat-send" type="submit">Gửi</button>
      </form>
    </aside>

    <div id="loader" role="status" aria-live="polite">
      <div class="loader-card">
        <p class="loader-label">Loading 3D Companion</p>
        <div class="loader-track"><div id="loader-progress"></div></div>
        <p id="loader-note">Preparing assets...</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
